name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python host tools
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint Python
        run: uv run --locked ruff check .

      - name: Type check Python
        run: uv run --locked pyright

      - name: Run Python tests
        run: uv run --locked pytest --cov=mcp_server --cov=scripts --cov-report=term-missing

  firmware:
    name: Firmware build and checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.18

      - name: Run native firmware unit tests
        run: cd firmware && pio test -e native

      - name: Build CoreS3 firmware
        run: cd firmware && pio run -e m5stack-cores3

      - name: Run high-severity firmware static checks
        run: cd firmware && pio check -e m5stack-cores3 --severity=high --fail-on-defect=high
